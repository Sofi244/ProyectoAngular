<h2>Listado de Turnos</h2>

@for (t of turnos; track t.id) {
  <div style="border: 1px solid black; margin: 10px; padding: 10px;">
    <h3>Paciente: {{ t.paciente }}</h3>
    <p>Fecha: {{ t.fecha }}</p>
    <p>Hora: {{ t.hora }}</p>
    <p>Tratamiento: {{ t.tratamiento }}</p>
    <button (click)="editarTurno(t)" style="margin-right: 10px;">Editar</button>
    <button (click)="eliminarTurno(t.id)">Eliminar Turno</button>
  </div>
}
