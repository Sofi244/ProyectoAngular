<form [formGroup]="turnoForm" (ngSubmit)="guardarTurno()">
    <input formControlName="paciente" placeholder="Nombre del Paciente">
    <input formControlName="fecha" type="date">
    <input formControlName="hora" type="time">
    <input formControlName="tratamiento" placeholder="Tratamiento a realizar">
    <button type="submit" [disabled]="turnoForm.invalid">Guardar Turno</button>
  </form>
